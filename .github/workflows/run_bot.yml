name: vIcmAr Binance Bot

on:
  schedule:
    - cron: '0 * * * *'  # Se ejecuta cada 1 hora (al minuto 0)
  workflow_dispatch:      # Permite ejecutarlo manualmente con opciones
    inputs:
      modo_prueba:
        description: 'Modo Prueba (True = No publicar)'
        required: true
        default: false
        type: boolean 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:      # Permisos necesarios para guardar el historial en el repo
      contents: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install requests groq python-dotenv

      - name: Ejecutar Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SQUARE_API_KEY: ${{ secrets.SQUARE_API_KEY || secrets.BINANCE_API_KEY }}
          MODO_PRUEBA: ${{ inputs.modo_prueba || 'false' }} # False por defecto (cron), o lo que elijas manual
          GROQ_MODEL_NAME: "llama-3.3-70b-versatile" # 👈 Modelo de Groq a usar. Cambiar aquí si es deprecado.
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          ID_TELEGRAM: ${{ secrets.ID_TELEGRAM }}
        run: python main.py

      - name: Guardar base de datos (historial)
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git pull origin main --no-edit || echo "⚠️ Advertencia: No se pudo sincronizar, intentando forzar guardado..."
          git add historial.json
          # Hace commit y push solo si hubo cambios en el historial
          git commit -m "💾 Actualizar historial de publicaciones" || echo "No hubo cambios en el historial"
          git push || echo "Nada que subir"