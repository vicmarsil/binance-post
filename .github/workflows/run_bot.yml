name: vIcmAr Binance Bot

on:
  schedule:
    - cron: '0 */3 * * *'  # Se ejecuta CADA 3 HORAS en el minuto 0 (Ej: 00:00, 03:00, 06:00...)
  workflow_dispatch:      # Permite ejecutarlo manualmente con opciones
    inputs:
      modo_prueba:
        description: 'Modo Prueba (True = No publicar)'
        required: true
        default: false
        type: boolean 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:      # Permisos necesarios para guardar el historial en el repo
      contents: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Importante: Trae toda la historia para evitar errores de push

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install requests groq python-dotenv selenium webdriver-manager google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Ejecutar Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SQUARE_API_KEY: ${{ secrets.SQUARE_API_KEY || secrets.BINANCE_API_KEY }}
          MODO_PRUEBA: ${{ inputs.modo_prueba || 'false' }} # False por defecto (cron), o lo que elijas manual
          GROQ_MODEL_NAME: "llama-3.3-70b-versatile" # 👈 Modelo de Groq a usar. Cambiar aquí si es deprecado.
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          ID_TELEGRAM: ${{ secrets.ID_TELEGRAM }}
          P0X_EMAIL: ${{ secrets.P0X_EMAIL }}
          P0X_PASSWORD: ${{ secrets.P0X_PASSWORD }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: python main.py

      - name: Guardar base de datos (historial)
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          
          # Estrategia agresiva anti-conflictos:
          # 1. Respaldamos el historial nuevo generado en esta ejecución
          cp historial.json historial_temp.json || true
          
          # 2. Descartamos cualquier cambio en Git para que el Pull sea 100% limpio
          git checkout -- historial.json || true
          git pull origin main --rebase || true
          
          # 3. Restauramos nuestro archivo y lo forzamos como la única verdad
          mv historial_temp.json historial.json || true
          git add historial.json
          
          git commit -m "💾 Actualizar historial de publicaciones" || echo "⚠️ No hubo cambios para guardar"
          git push origin main || echo "⚠️ Falló el push (posible colisión exacta), se ignorará y reintentará en el próximo ciclo."