name: vIcmAr Binance Bot

on:
  schedule:
    - cron: '0 */3 * * *'  # Se ejecuta cada 3 horas
  workflow_dispatch:      # Permite ejecutarlo manualmente con opciones
    inputs:
      modo_prueba:
        description: 'Modo Prueba (True = No publicar)'
        required: true
        default: 'False'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:      # Permisos necesarios para guardar el historial en el repo
      contents: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install requests groq python-dotenv

      - name: Ejecutar Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SQUARE_API_KEY: ${{ secrets.SQUARE_API_KEY || secrets.BINANCE_API_KEY }}
          MODO_PRUEBA: ${{ inputs.modo_prueba || 'False' }} # False por defecto (cron), o lo que elijas manual
        run: python main.py

      - name: Guardar base de datos (historial)
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add historial.json
          # Hace commit y push solo si hubo cambios en el historial
          git commit -m "💾 Actualizar historial de publicaciones" || echo "No hubo cambios en el historial"
          git push || echo "Nada que subir"