name: vIcmAr Binance Bot

on:
  schedule:
    - cron: '30 9 * * *'   # 09:30 UTC (06:30 AM Argentina)
    - cron: '0 22 * * *'   # 22:00 UTC (19:00 PM Argentina)
  workflow_dispatch:      # Permite ejecutarlo manualmente con opciones
    inputs:
      modo_prueba:
        description: 'Modo Prueba (True = No publicar)'
        required: true
        default: false
        type: boolean 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:      # Permisos necesarios para guardar el historial en el repo
      contents: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Importante: Trae toda la historia para evitar errores de push

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install requests groq python-dotenv selenium webdriver-manager

      - name: Ejecutar Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SQUARE_API_KEY: ${{ secrets.SQUARE_API_KEY || secrets.BINANCE_API_KEY }}
          MODO_PRUEBA: ${{ inputs.modo_prueba || 'false' }} # False por defecto (cron), o lo que elijas manual
          GROQ_MODEL_NAME: "llama-3.3-70b-versatile" # 👈 Modelo de Groq a usar. Cambiar aquí si es deprecado.
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          ID_TELEGRAM: ${{ secrets.ID_TELEGRAM }}
          P0X_EMAIL: ${{ secrets.P0X_EMAIL }}
          P0X_PASSWORD: ${{ secrets.P0X_PASSWORD }}
        run: python main.py

      - name: Guardar base de datos (historial)
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          
          git add historial.json
          # Hace commit y push solo si hubo cambios en el historial
          git commit -m "💾 Actualizar historial de publicaciones" || echo "⚠️ No hubo cambios para guardar"
          
          # Sincronización robusta: Trae cambios remotos (rebase) antes de subir
          git pull --rebase origin main || echo "⚠️ Rebase falló, intentando continuar..."
          git push origin main || (git pull --rebase origin main && git push origin main)