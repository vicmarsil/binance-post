name: Promocion Bitget Wallet

on:
  schedule:
    - cron: '0 15 * * *'  # Se ejecuta todos los días a las 15:00 UTC
  workflow_dispatch:      # Permite probarlo manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install requests groq python-dotenv selenium webdriver-manager google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Ejecutar Bot de Bitget
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MODO_PRUEBA: 'False'
          GROQ_MODEL_NAME: "llama-3.3-70b-versatile"
          TIPO_BOT: "BITGET"  # 👈 Esto activa el código que acabamos de agregar
          REFERIDO_BITGET: ${{ secrets.REFERIDO_BITGET }} # 👈 Variable nueva
          TOKEN_TELEGRAM: ${{ secrets.TOKEN_TELEGRAM }}
          ID_TELEGRAM: ${{ secrets.ID_TELEGRAM }}
          ID_TELEGRAM_ADMIN: ${{ secrets.ID_TELEGRAM_ADMIN }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        # Nota: Omitimos deliberadamente SQUARE_API_KEY por seguridad
        run: python main.py